kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: k8s-angular
nodes:
  - role: control-plane
    extraPortMappings:
      # Angular SPA (nginx HTTPS)
      - containerPort: 30443
        hostPort: 5500
        protocol: TCP
      # Keycloak proxy (nginx HTTPS)
      - containerPort: 30844
        hostPort: 8443
        protocol: TCP
